projects:
  - name: ScanMatch
    description: A brand places a QR code on physical products, packaging, or in-store displays. When a customer scans it, they get a snappy 3-question quiz and instantly receive AI-personalized product recommendations.
    tech: [JavaScript, CSS, HTML]
    repo_url: https://github.com/awaisaziz/scanmatch
    image: images/projects/scanmatch.jpg
    live_url: ""

  - name: SparqMind
    description: Engineered a Chain-of-Thought pipeline with an interactive verification layer to increase transparency, enabling users to validate reasoning and ensure data integrity prior to query execution.
    tech: [Python, JavaScript, CSS, HTML, Shell]
    repo_url: https://github.com/awaisaziz/LLM_Text2Sparql_Query
    image: images/projects/text2sparql.jpg
    live_url: ""

  - name: Uncertainty Text2SQL
    description: An uncertainty-aware Text-to-SQL system that translates natural language questions into SQL queries, while quantifying model confidence to flag potentially incorrect or ambiguous outputs.
    tech: [Python]
    repo_url: https://github.com/awaisaziz/uncertainity-text2sql
    image: images/projects/text2sql.jpg
    live_url: ""

  - name: Text-to-SQL Generation Using LLM
    description: Architected a retrieval-augmented generation (RAG) NLP pipeline for automated Text-to-SQL generation and execution-based self-consistency validation.
    tech: [Python]
    repo_url: https://github.com/awaisaziz/LLM_Text2SQL_Query
    image: images/projects/llm-sql.jpg
    live_url: ""

